<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王一轩｜数字作品集</title>
    <style>
        html,
        body,
        #root {
            margin: 0;
            min-height: 100%;
            background: var(--boot-bg, #09090b);
        }

        html[data-theme="light"],
        html[data-theme="light"] body,
        html[data-theme="light"] #root {
            background: var(--boot-bg, #f1f1f1);
        }
    </style>
    <script>
        (function () {
            var resolvedTheme = "dark";
            try {
                var savedTheme = localStorage.getItem("yw-theme");
                if (savedTheme === "light" || savedTheme === "dark") {
                    resolvedTheme = savedTheme;
                } else {
                    resolvedTheme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
                }
            } catch (error) {
                resolvedTheme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
            }

            var bootBg = resolvedTheme === "light" ? "#f1f1f1" : "#09090b";
            document.documentElement.dataset.theme = resolvedTheme;
            document.documentElement.style.setProperty("--boot-bg", bootBg);
            document.documentElement.style.backgroundColor = bootBg;
            document.documentElement.style.colorScheme = resolvedTheme;
        })();
    </script>
    <link rel="icon" type="image/png" href="/assets/boy.png">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
